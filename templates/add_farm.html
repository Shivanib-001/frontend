<!DOCTYPE html>
<html>
<head>
<title>Add Farm</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f6f8;
}

#map{
    height:70vh;
    width:100%;
}

.top-bar{
    padding:10px;
    background:white;
    text-align:center;
    box-shadow:0px 2px 5px rgba(0,0,0,0.2);
}

input{
    padding:10px;
    width:200px;
    margin:5px;
}

button{
    padding:10px 15px;
    margin:5px;
    border:none;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

.save-btn{ background:green; }
.back-btn{ background:gray; }
.gps-btn{ background:blue; }
.clear-btn{ background:red; }

</style>
</head>

<body>

<div class="top-bar">
    <input id="farmName" placeholder="Farm Name">

    <button class="gps-btn" onclick="getLocation()">📍 Current Location</button>
    <button class="clear-btn" onclick="clearPolygon()">Clear</button>
    <button class="back-btn" onclick="goBack()">⬅ Back</button>
    <button class="save-btn" onclick="saveFarm()">Save</button>

    <div id="status"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

/*---------------------------- MAP LOAD --------------------------------------*/
const ACCESS_TOKEN = "pk.eyJ1Ijoic3VtaXRjaGF0dGVyamVlIiwiYSI6ImNrd2prODhoazB6enIycHBrZmRrY2FtMGkifQ.WS22x5YJykpK9aFATKT8EA";

const map = L.map("map").setView([28.436, 77.304], 19);

L.tileLayer(`https://api.mapbox.com/v4/mapbox.satellite/{z}/{x}/{y}@2x.png?access_token=${ACCESS_TOKEN}`, {
    maxZoom: 24,
    tileSize: 512,
    zoomOffset: -1,
}).addTo(map);

/*---------------------------- POLYGON LOGIC --------------------------------------*/

let points = [];
let markers = [];
let polygon = null;

// Click to add points
map.on("click", function (e) {

    const { lat, lng } = e.latlng;

    points.push([lat, lng]);

    const marker = L.marker([lat, lng]).addTo(map);
    markers.push(marker);

    drawPolygon();
});

function drawPolygon()
{
    if(polygon) map.removeLayer(polygon);

    if(points.length >= 3)
    {
        polygon = L.polygon(points, {color:"yellow"}).addTo(map);
    }
}

/*---------------------------- CLEAR --------------------------------------*/
function clearPolygon()
{
    points = [];

    markers.forEach(m => map.removeLayer(m));
    markers = [];

    if(polygon)
    {
        map.removeLayer(polygon);
        polygon = null;
    }
}

/*---------------------------- GPS LOCATION --------------------------------------*/
function getLocation()
{
    if(navigator.geolocation)
    {
        navigator.geolocation.getCurrentPosition(position => {

            const lat = position.coords.latitude;
            const lng = position.coords.longitude;

            map.setView([lat, lng], 19);

            L.marker([lat, lng]).addTo(map);

        }, () => {
            alert("Unable to fetch location")
        });
    }
}

/*---------------------------- SAVE --------------------------------------*/
async function saveFarm()
{
    const name = document.getElementById("farmName").value.trim();
    const status = document.getElementById("status");

    if(!name)
    {
        status.innerHTML = "❌ Farm name required";
        return;
    }

    if(points.length < 3)
    {
        status.innerHTML = "❌ Select at least 3 points";
        return;
    }

    const data = {
        name: name,
        boundary: points
    };

    const response = await fetch("/save_farm",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    if(result.status === "saved")
    {
        status.innerHTML = "✅ Saved";

        setTimeout(()=>{
            window.location.href = "/farm"
        },1000);
    }
    else
    {
        status.innerHTML = "❌ " + result.message;
    }
}

/*---------------------------- BACK --------------------------------------*/
function goBack()
{
    window.location.href = "/farm";
}

</script>

</body>
</html>
